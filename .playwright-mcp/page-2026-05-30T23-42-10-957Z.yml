            - generic [ref=e88] [cursor=pointer]: "6400"
            - generic [ref=e130]: "100"
            - generic [ref=e131]: ISO
          - paragraph [ref=e132]: 画质纯净，噪点几乎不可见。适合室外晴天等光线充足的场景。
        - group [ref=e133]:
          - generic "噪点的形成原理" [ref=e134] [cursor=pointer]
        - group [ref=e135]:
          - generic "各 ISO 典型噪点表现" [ref=e136] [cursor=pointer]
        - group [ref=e137]:
          - generic "两种噪点的外观区别" [ref=e138] [cursor=pointer]
        - group [ref=e139]:
          - generic "双原生 ISO（进阶）" [ref=e140] [cursor=pointer]
        - group [ref=e141]:
          - generic "EI（电影机曝光指数）" [ref=e142] [cursor=pointer]
        - separator [ref=e143]
        - heading "快门速度 Permalink to \"快门速度\"" [level=3] [ref=e144]:
          - text: 快门速度
          - link "Permalink to \"快门速度\"" [ref=e145] [cursor=pointer]:
            - /url: "#快门速度"
            - text: "#"
        - paragraph [ref=e146]: 快门速度决定感光元件暴露在光线下的时长，用秒或分数表示（如 1/500s、2s）。
        - list [ref=e147]:
          - listitem [ref=e148]:
            - strong [ref=e149]: 高速快门
            - text: （1/500s 以上）：凝固运动瞬间，画面清晰锐利
          - listitem [ref=e150]:
            - strong [ref=e151]: 低速快门
            - text: （1/30s 以下）：运动主体会产生模糊轨迹，有时是创作效果（水流、车流）
        - generic [ref=e152]:
          - paragraph [ref=e153]: 手持拍摄的安全快门
          - paragraph [ref=e154]:
            - text: 手持相机时，快门速度低于
            - strong [ref=e155]: 1/焦距
            - text: 容易产生手抖虚化。 例如使用 50mm 镜头，安全快门约为
            - strong [ref=e156]: 1/50s
            - text: 或更快。 开启机身/镜头防抖（IBIS/OIS）可获得 3–5 档补偿。
        - generic [ref=e157]:
          - img [ref=e162]:
            - generic [ref=e167] [cursor=pointer]: "1000"
            - generic [ref=e170] [cursor=pointer]: "500"
            - generic [ref=e173] [cursor=pointer]: "250"
            - generic [ref=e176] [cursor=pointer]: "125"
            - generic [ref=e179] [cursor=pointer]: "60"
            - generic [ref=e182] [cursor=pointer]: "30"
            - generic [ref=e185] [cursor=pointer]: "15"
            - generic [ref=e188] [cursor=pointer]: "8"
            - generic [ref=e192]: 1/60
            - generic [ref=e193]: 秒
          - paragraph [ref=e194]: 可见运动模糊，曝光接近合理。手持时注意防抖，建议开启 IBIS。
        - group [ref=e195]:
          - generic "长曝光" [ref=e196] [cursor=pointer]
        - group [ref=e197]:
          - generic "ND 减光镜" [ref=e198] [cursor=pointer]
        - separator [ref=e199]
        - heading "光圈（F 值） Permalink to \"光圈（F 值）\"" [level=3] [ref=e200]:
          - text: 光圈（F 值）
          - link "Permalink to \"光圈（F 值）\"" [ref=e201] [cursor=pointer]:
            - /url: "#光圈-f-值"
            - text: "#"
        - paragraph [ref=e202]: 光圈控制镜头的进光孔径，以 f 数表示。f 数越小，光圈越大。
        - list [ref=e203]:
          - listitem [ref=e204]:
            - strong [ref=e205]: 大光圈
            - text: （f/1.4、f/2）：进光多，景深浅，背景虚化明显
          - listitem [ref=e206]:
            - strong [ref=e207]: 小光圈
            - text: （f/8、f/11）：进光少，景深深，全图清晰，适合风景
        - generic [ref=e208]:
          - paragraph [ref=e209]: 最佳成像光圈
          - paragraph [ref=e210]:
            - text: 大多数镜头在
            - strong [ref=e211]: f/5.6–f/8
            - text: 时分辨率和衍射的平衡最优，画质最佳。 大光圈（全开）和极小光圈（f/16 以上）通常画质有所下降。
        - separator [ref=e212]
        - heading "三者联动：曝光值（EV） Permalink to \"三者联动：曝光值（EV）\"" [level=3] [ref=e213]:
          - text: 三者联动：曝光值（EV）
          - link "Permalink to \"三者联动：曝光值（EV）\"" [ref=e214] [cursor=pointer]:
            - /url: "#三者联动-曝光值-ev"
            - text: "#"
        - paragraph [ref=e215]: 曝光量 = ISO × 快门时间 ÷ f²
        - paragraph [ref=e216]:
          - text: 三者有一种等效关系：如果提高一档快门速度（减少进光），可以同时扩大一档光圈或提高一档 ISO 来补偿，最终曝光量不变——这叫
          - strong [ref=e217]: 等效曝光
          - text: 。
        - separator [ref=e218]
        - heading "拍摄模式 Permalink to \"拍摄模式\"" [level=2] [ref=e219]:
          - text: 拍摄模式
          - link "Permalink to \"拍摄模式\"" [ref=e220] [cursor=pointer]:
            - /url: "#拍摄模式"
            - text: "#"
        - paragraph [ref=e221]: 相机转盘上的 M / A / S / P 对应不同的自动化程度。
        - heading "M — 全手动模式 Permalink to \"M — 全手动模式\"" [level=3] [ref=e222]:
          - text: M — 全手动模式
          - link "Permalink to \"M — 全手动模式\"" [ref=e223] [cursor=pointer]:
            - /url: "#m-—-全手动模式"
            - text: "#"
        - paragraph [ref=e224]: ISO、快门、光圈全部手动设定。适合有明确创作意图、需要精确控制的场景（棚拍、长曝光、视频录制）。
        - heading "A / Av — 光圈优先 Permalink to \"A / Av — 光圈优先\"" [level=3] [ref=e225]:
          - text: A / Av — 光圈优先
          - link "Permalink to \"A / Av — 光圈优先\"" [ref=e226] [cursor=pointer]:
            - /url: "#a-av-—-光圈优先"
            - text: "#"
        - paragraph [ref=e227]:
          - strong [ref=e228]: 你设定光圈
          - text: ，相机自动选择快门速度以获得正确曝光。
        - paragraph [ref=e229]: 最常用的模式之一。适合：
        - list [ref=e230]:
          - listitem [ref=e231]: 人像（大光圈虚化背景）
          - listitem [ref=e232]: 风景（小光圈全景清晰）
          - listitem [ref=e233]: 任何需要控制景深的场景
        - heading "S / Tv — 快门优先 Permalink to \"S / Tv — 快门优先\"" [level=3] [ref=e234]:
          - text: S / Tv — 快门优先
          - link "Permalink to \"S / Tv — 快门优先\"" [ref=e235] [cursor=pointer]:
            - /url: "#s-tv-—-快门优先"
            - text: "#"
        - paragraph [ref=e236]:
          - strong [ref=e237]: 你设定快门速度
          - text: ，相机自动选择光圈。适合：
        - list [ref=e238]:
          - listitem [ref=e239]: 运动、体育（高速凝固动作）
          - listitem [ref=e240]: 流水、车轨（低速创意效果）
        - heading "P — 程序自动 Permalink to \"P — 程序自动\"" [level=3] [ref=e241]:
          - text: P — 程序自动
          - link "Permalink to \"P — 程序自动\"" [ref=e242] [cursor=pointer]:
            - /url: "#p-—-程序自动"
            - text: "#"
        - paragraph [ref=e243]: 相机自动选择快门和光圈的组合，你可以拨轮调整这个组合而不改变总曝光量（程序偏移）。适合快速抓拍、不确定参数时使用。
        - generic [ref=e244]:
          - paragraph [ref=e245]: ISO 自动（Auto ISO）
          - paragraph [ref=e246]:
            - text: 在 M / A / S 模式下开启
            - strong [ref=e247]: Auto ISO
            - text: 可以让相机辅助控制总曝光量，同时保留你对快门或光圈的完全控制，是很多新手从 P 模式进阶的第一步。
        - separator [ref=e248]
        - heading "对焦模式 Permalink to \"对焦模式\"" [level=2] [ref=e249]:
          - text: 对焦模式
          - link "Permalink to \"对焦模式\"" [ref=e250] [cursor=pointer]:
            - /url: "#对焦模式"
            - text: "#"
        - heading "AF-S — 单次自动对焦 Permalink to \"AF-S — 单次自动对焦\"" [level=3] [ref=e251]:
          - text: AF-S — 单次自动对焦
          - link "Permalink to \"AF-S — 单次自动对焦\"" [ref=e252] [cursor=pointer]:
            - /url: "#af-s-—-单次自动对焦"
            - text: "#"
        - paragraph [ref=e253]:
          - text: 半按快门时对焦一次，锁定后不再移动。适合
          - strong [ref=e254]: 静止主体
          - text: （建筑、产品、摆拍人像）。
        - heading "AF-C — 连续自动对焦 Permalink to \"AF-C — 连续自动对焦\"" [level=3] [ref=e255]:
          - text: AF-C — 连续自动对焦
          - link "Permalink to \"AF-C — 连续自动对焦\"" [ref=e256] [cursor=pointer]:
            - /url: "#af-c-—-连续自动对焦"
            - text: "#"
        - paragraph [ref=e257]:
          - text: 持续追踪移动主体，直到按下快门为止。适合
          - strong [ref=e258]: 运动主体
          - text: （运动员、鸟类、街拍）。
        - blockquote [ref=e259]:
          - paragraph [ref=e260]:
            - text: 佳能叫
            - strong [ref=e261]: AI SERVO
            - text: ，尼康叫
            - strong [ref=e262]: AF-C
            - text: ，索尼叫
            - strong [ref=e263]: AF-C
            - text: 。
        - heading "MF — 手动对焦 Permalink to \"MF — 手动对焦\"" [level=3] [ref=e264]:
          - text: MF — 手动对焦
          - link "Permalink to \"MF — 手动对焦\"" [ref=e265] [cursor=pointer]:
            - /url: "#mf-—-手动对焦"
            - text: "#"
        - paragraph [ref=e266]: 完全手动转动对焦环。适合：
        - list [ref=e267]:
          - listitem [ref=e268]: 微距摄影（AF 容易偏焦）
          - listitem [ref=e269]: 极低对比度场景（暗光、雾天）
          - listitem [ref=e270]: 天文摄影（对焦至无穷远）
        - generic [ref=e271]:
          - paragraph [ref=e272]: 对焦辅助
          - paragraph [ref=e273]:
            - text: 手动对焦时可开启
            - strong [ref=e274]: 峰值对焦（Focus Peaking）
            - text: ，对焦清晰的区域会高亮显示轮廓；或放大预览（通常按 MF-Assist 键）精确确认焦点。
