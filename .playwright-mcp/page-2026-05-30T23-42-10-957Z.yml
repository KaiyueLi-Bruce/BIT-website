        - heading "相机使用 Permalink to \"相机使用\"" [level=1] [ref=e44]:
          - text: 相机使用
          - link "Permalink to \"相机使用\"" [ref=e45] [cursor=pointer]:
            - /url: "#相机使用"
            - text: "#"
        - paragraph [ref=e46]: 本文介绍摄影最核心的三个曝光参数，以及常用拍摄模式与对焦方式。掌握这些基础后，绝大多数场景都能拍出正确曝光的照片。
        - separator [ref=e47]
        - heading "曝光三角 Permalink to \"曝光三角\"" [level=2] [ref=e48]:
          - text: 曝光三角
          - link "Permalink to \"曝光三角\"" [ref=e49] [cursor=pointer]:
            - /url: "#曝光三角"
            - text: "#"
        - paragraph [ref=e50]: 曝光量由三个参数共同决定，改变其中任意一个都会影响画面的亮暗，同时也会带来其他效果上的变化。
        - heading "ISO（感光度） Permalink to \"ISO（感光度）\"" [level=3] [ref=e51]:
          - text: ISO（感光度）
          - link "Permalink to \"ISO（感光度）\"" [ref=e52] [cursor=pointer]:
            - /url: "#iso-感光度"
            - text: "#"
        - paragraph [ref=e53]: ISO 表示感光元件对光线的敏感程度。
        - list [ref=e54]:
          - listitem [ref=e55]:
            - strong [ref=e56]: 数值越低
            - text: （ISO 100）：噪点少，画质干净，适合光线充足的环境
          - listitem [ref=e57]:
            - strong [ref=e58]: 数值越高
            - text: （ISO 3200+）：进光能力强，但会产生明显颗粒感（噪点）
        - generic [ref=e59]:
          - paragraph [ref=e60]: 经验法则
          - paragraph [ref=e61]:
            - text: 尽量使用相机的
            - strong [ref=e62]: 原生最低 ISO
            - text: （通常是 ISO 100 或 64），只有在快门/光圈无法满足需求时才提高 ISO。有双原生 ISO 的机型，高感时优先跳到高原生点。
        - generic [ref=e63]:
          - img [ref=e68]:
            - generic [ref=e73] [cursor=pointer]: "100"
            - generic [ref=e75] [cursor=pointer]: "200"
            - generic [ref=e78] [cursor=pointer]: "400"
