            - paragraph [ref=e351]: 较大光圈，背景柔和虚化，兼顾进光与画质，纪实 / 人像常用。
          - generic [ref=e352]:
            - paragraph [ref=e353]: 最佳成像光圈
            - paragraph [ref=e354]:
              - text: 大多数镜头在
              - strong [ref=e355]: f/5.6–f/8
              - text: 时分辨率和衍射的平衡最优，画质最佳。 大光圈（全开）和极小光圈（f/16 以上）通常画质有所下降。
          - separator [ref=e356]
          - heading "三者联动：曝光值（EV） Permalink to \"三者联动：曝光值（EV）\"" [level=3] [ref=e357]:
            - text: 三者联动：曝光值（EV）
            - link "Permalink to \"三者联动：曝光值（EV）\"" [ref=e358] [cursor=pointer]:
              - /url: "#三者联动-曝光值-ev"
              - text: "#"
          - paragraph [ref=e359]: 曝光量 = ISO × 快门时间 ÷ f²
          - paragraph [ref=e360]:
            - text: 三者有一种等效关系：如果提高一档快门速度（减少进光），可以同时扩大一档光圈或提高一档 ISO 来补偿，最终曝光量不变——这叫
            - strong [ref=e361]: 等效曝光
            - text: 。
          - separator [ref=e362]
          - heading "拍摄模式 Permalink to \"拍摄模式\"" [level=2] [ref=e363]:
