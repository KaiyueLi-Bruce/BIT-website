            - strong [ref=e372]: 你设定光圈
            - text: ，相机自动选择快门速度以获得正确曝光。
          - paragraph [ref=e373]: 最常用的模式之一。适合：
          - list [ref=e374]:
            - listitem [ref=e375]: 人像（大光圈虚化背景）
            - listitem [ref=e376]: 风景（小光圈全景清晰）
