            - link "Permalink to \"拍摄模式\"" [ref=e364] [cursor=pointer]:
              - /url: "#拍摄模式"
              - text: "#"
          - paragraph [ref=e365]: 相机转盘上的 M / A / S / P 对应不同的自动化程度。
          - heading "M — 全手动模式 Permalink to \"M — 全手动模式\"" [level=3] [ref=e366]:
            - text: M — 全手动模式
            - link "Permalink to \"M — 全手动模式\"" [ref=e367] [cursor=pointer]:
              - /url: "#m-—-全手动模式"
              - text: "#"
          - paragraph [ref=e368]: ISO、快门、光圈全部手动设定。适合有明确创作意图、需要精确控制的场景（棚拍、长曝光、视频录制）。
          - heading "A / Av — 光圈优先 Permalink to \"A / Av — 光圈优先\"" [level=3] [ref=e369]:
            - text: A / Av — 光圈优先
