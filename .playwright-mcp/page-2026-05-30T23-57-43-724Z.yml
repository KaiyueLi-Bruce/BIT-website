              - text: "#"
          - paragraph [ref=e266]: 光圈控制镜头的进光孔径，以 f 数表示。f 数越小，光圈越大。
          - list [ref=e267]:
            - listitem [ref=e268]:
              - strong [ref=e269]: 大光圈
              - text: （f/1.4、f/2）：进光多，景深浅，背景虚化明显
            - listitem [ref=e270]:
              - strong [ref=e271]: 小光圈
              - text: （f/8、f/11）：进光少，景深深，全图清晰，适合风景
