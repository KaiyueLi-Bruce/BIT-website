              - text: "#"
          - paragraph [ref=e72]: 曝光量由三个参数共同决定，改变其中任意一个都会影响画面的亮暗，同时也会带来其他效果上的变化。
          - heading "ISO（感光度） Permalink to \"ISO（感光度）\"" [level=3] [ref=e73]:
            - text: ISO（感光度）
            - link "Permalink to \"ISO（感光度）\"" [ref=e74] [cursor=pointer]:
              - /url: "#iso-感光度"
              - text: "#"
          - paragraph [ref=e75]: ISO 表示感光元件对光线的敏感程度。
          - list [ref=e76]:
            - listitem [ref=e77]:
              - strong [ref=e78]: 数值越低
              - text: （ISO 100）：噪点少，画质干净，适合光线充足的环境
            - listitem [ref=e79]:
              - strong [ref=e80]: 数值越高
              - text: （ISO 3200+）：进光能力强，但会产生明显颗粒感（噪点）
          - generic [ref=e81]:
            - paragraph [ref=e82]: 经验法则
            - paragraph [ref=e83]:
              - text: 尽量使用相机的
              - strong [ref=e84]: 原生最低 ISO
              - text: （通常是 ISO 100 或 64），只有在快门/光圈无法满足需求时才提高 ISO。有双原生 ISO 的机型，高感时优先跳到高原生点。
