              - /url: "#快门速度"
              - text: "#"
          - paragraph [ref=e168]: 快门速度决定感光元件暴露在光线下的时长，用秒或分数表示（如 1/500s、2s）。
          - list [ref=e169]:
            - listitem [ref=e170]:
              - strong [ref=e171]: 高速快门
              - text: （1/500s 以上）：凝固运动瞬间，画面清晰锐利
            - listitem [ref=e172]:
              - strong [ref=e173]: 低速快门
              - text: （1/30s 以下）：运动主体会产生模糊轨迹，有时是创作效果（水流、车流）
          - generic [ref=e174]:
            - paragraph [ref=e175]: 手持拍摄的安全快门
            - paragraph [ref=e176]:
              - text: 手持相机时，快门速度低于
              - strong [ref=e177]: 1/焦距
              - text: 容易产生手抖虚化。 例如使用 50mm 镜头，安全快门约为
              - strong [ref=e178]: 1/50s
              - text: 或更快。 开启机身/镜头防抖（IBIS/OIS）可获得 3–5 档补偿。
