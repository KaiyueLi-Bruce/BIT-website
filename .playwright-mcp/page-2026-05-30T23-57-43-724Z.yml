            - text: ，相机自动选择光圈。适合：
          - list [ref=e382]:
            - listitem [ref=e383]: 运动、体育（高速凝固动作）
            - listitem [ref=e384]: 流水、车轨（低速创意效果）
          - heading "P — 程序自动 Permalink to \"P — 程序自动\"" [level=3] [ref=e385]:
            - text: P — 程序自动
            - link "Permalink to \"P — 程序自动\"" [ref=e386] [cursor=pointer]:
              - /url: "#p-—-程序自动"
              - text: "#"
          - paragraph [ref=e387]: 相机自动选择快门和光圈的组合，你可以拨轮调整这个组合而不改变总曝光量（程序偏移）。适合快速抓拍、不确定参数时使用。
          - generic [ref=e388]:
            - paragraph [ref=e389]: ISO 自动（Auto ISO）
            - paragraph [ref=e390]:
              - text: 在 M / A / S 模式下开启
              - strong [ref=e391]: Auto ISO
              - text: 可以让相机辅助控制总曝光量，同时保留你对快门或光圈的完全控制，是很多新手从 P 模式进阶的第一步。
